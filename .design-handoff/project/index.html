<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Scryer — Design System & Page Templates</title>
  <link rel="stylesheet" href="styles/app.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="theme-shadowforge">
<div id="root"></div>

<script type="text/babel" src="src/shared.jsx"></script>
<script type="text/babel" src="src/page_designsystem.jsx"></script>
<script type="text/babel" src="src/page_dashboard.jsx"></script>
<script type="text/babel" src="src/page_forge.jsx"></script>
<script type="text/babel" src="src/page_forge_tabs.jsx"></script>
<script type="text/babel" src="src/page_vtt.jsx"></script>
<script type="text/babel" src="src/page_character.jsx"></script>
<script type="text/babel" src="src/page_npc.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "shadowforge",
  "role": "player"
}/*EDITMODE-END*/;

const THEMES = [
  {id:'shadowforge', name:'Shadowforge', sub:'Charcoal · Ember', swatch:['#1c1917','#ea580c']},
  {id:'obsidian',    name:'Obsidian',    sub:'Near-black · Gold', swatch:['#111111','#c9a84c']},
  {id:'nightfall',   name:'Nightfall',   sub:'Midnight · Cyan', swatch:['#0f172a','#38bdf8']},
  {id:'grimoire',    name:'Grimoire',    sub:'Violet · Arcane', swatch:['#1a1425','#c084fc']},
  {id:'parchment',   name:'Parchment',   sub:'Ivory · Ink (light)', swatch:['#f5f0e8','#92742d']},
  {id:'silverlight', name:'Silverlight', sub:'Clean · Indigo (light)', swatch:['#f8fafc','#6366f1']},
];

const PAGES = [
  { id:'dashboard', label:'Campaign', icon:'home' },
  { id:'forge',     label:'Forge',    icon:'hammer' },
  { id:'vtt',       label:'VTT',      icon:'grid' },
  { id:'character', label:'Character sheet', icon:'shield' },
  { id:'npc',       label:'NPC detail', icon:'users' },
  { id:'ds',        label:'Design system', icon:'palette' },
];

function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('sc_page') || 'dashboard');
  const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);
  const [role, setRole] = React.useState(TWEAK_DEFAULTS.role); // dm | player
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [editMode, setEditMode] = React.useState(false);
  const isDM = role === 'dm';

  React.useEffect(() => {
    document.body.className = `theme-${theme}`;
  }, [theme]);
  React.useEffect(() => { localStorage.setItem('sc_page', page); }, [page]);

  // Tweak mode protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') { setEditMode(true); setTweaksOpen(true); }
      if (e.data.type === '__deactivate_edit_mode') { setEditMode(false); setTweaksOpen(false); }
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweak = (key, val) => {
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:val}}, '*');
  };

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
      {/* App sidebar */}
      <nav style={{width:220, background:'var(--sidebar)', borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', flexShrink:0}}>
        <div style={{padding:'16px 16px 14px', display:'flex', alignItems:'center', gap:10, borderBottom:'1px solid var(--border)'}}>
          <ScryerMark size={26}/>
          <div>
            <div className="font-serif" style={{fontSize:16, letterSpacing:'0.04em'}}>SCRYER</div>
            <div style={{fontSize:10, color:'var(--muted-foreground)', marginTop:-2}}>D&D 5e digital suite</div>
          </div>
        </div>

        <div style={{padding:'10px 8px', flex:1, overflow:'auto'}}>
          <div className="sc-label" style={{padding:'6px 10px 10px'}}>Templates</div>
          {PAGES.map(p => (
            <button key={p.id} className={`sidebar-link ${page === p.id ? 'active' : ''}`}
              onClick={() => setPage(p.id)}
              style={{width:'100%', textAlign:'left', border:'none', marginBottom:2}}>
              <Icon name={p.icon} size={15}/>
              <span>{p.label}</span>
            </button>
          ))}

          <hr className="sc-divider" style={{margin:'14px 8px'}}/>
          <div className="sc-label" style={{padding:'6px 10px 10px'}}>Context</div>
          <div style={{padding:'0 10px'}}>
            <div style={{fontSize:12, color:'var(--muted-foreground)', marginBottom:4}}>Campaign</div>
            <div className="font-serif" style={{fontSize:14}}>The Sunken Tides</div>
            <div style={{display:'flex', alignItems:'center', gap:6, marginTop:8}}>
              <span className="sc-badge" style={isDM ? {background:'color-mix(in srgb, var(--primary) 18%, transparent)', color:'var(--primary)', borderColor:'color-mix(in srgb, var(--primary) 35%, transparent)'} : {}}>
                {isDM ? <><Icon name="crown" size={10}/>DM view</> : <>Player view</>}
              </span>
            </div>
          </div>
        </div>

        <div style={{padding:10, borderTop:'1px solid var(--border)'}}>
          <button className="sc-btn" style={{width:'100%', justifyContent:'flex-start'}} onClick={() => setTweaksOpen(v => !v)}>
            <Icon name="palette" size={14}/>Tweaks
            <span style={{marginLeft:'auto', fontSize:10, color:'var(--muted-foreground)'}}>{theme}</span>
          </button>
        </div>
      </nav>

      {/* Main */}
      <main style={{flex:1, overflow:'auto', position:'relative', minWidth:0}}>
        {page === 'dashboard' && <CampaignDashboard isDM={isDM}/>}
        {page === 'forge' && <ForgePage isDM={isDM}/>}
        {page === 'vtt' && <VTTPage isDM={isDM}/>}
        {page === 'character' && <CharacterSheetPage/>}
        {page === 'npc' && <NPCDetailPage isDM={isDM}/>}
        {page === 'ds' && <DesignSystemPage/>}
      </main>

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{
          position:'fixed', right:16, bottom:16, width:300,
          background:'var(--popover)', color:'var(--popover-foreground)',
          border:'1px solid var(--border)', borderRadius:10,
          boxShadow:'0 20px 60px rgba(0,0,0,0.5)',
          padding:16, zIndex:1000
        }} className="sc-fade-in">
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
            <div className="font-serif" style={{fontSize:16}}>Tweaks</div>
            <button className="sc-btn sc-btn-ghost sc-btn-icon sc-btn-sm" onClick={() => setTweaksOpen(false)}><Icon name="x" size={12}/></button>
          </div>

          <div className="sc-label" style={{marginBottom:8}}>Theme</div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, marginBottom:16}}>
            {THEMES.map(t => (
              <button key={t.id} onClick={() => { setTheme(t.id); updateTweak('theme', t.id); }}
                style={{
                  padding:'8px 10px', borderRadius:6, textAlign:'left',
                  background: theme === t.id ? 'var(--accent)' : 'transparent',
                  border: theme === t.id ? '1px solid var(--primary)' : '1px solid var(--border)',
                  cursor:'pointer', display:'flex', alignItems:'center', gap:8
                }}>
                <div style={{display:'flex', flexShrink:0}}>
                  <div style={{width:10, height:18, background:t.swatch[0], borderRadius:'2px 0 0 2px'}}/>
                  <div style={{width:10, height:18, background:t.swatch[1], borderRadius:'0 2px 2px 0'}}/>
                </div>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:11, fontWeight:600}}>{t.name}</div>
                  <div style={{fontSize:9, color:'var(--muted-foreground)'}} className="truncate">{t.sub}</div>
                </div>
              </button>
            ))}
          </div>

          <div className="sc-label" style={{marginBottom:8}}>View as</div>
          <div style={{display:'flex', gap:6, marginBottom:12}}>
            <button onClick={() => { setRole('dm'); updateTweak('role','dm'); }} className={`sc-btn ${role==='dm'?'sc-btn-primary':''}`} style={{flex:1, justifyContent:'center'}}>
              <Icon name="crown" size={12}/>DM
            </button>
            <button onClick={() => { setRole('player'); updateTweak('role','player'); }} className={`sc-btn ${role==='player'?'sc-btn-primary':''}`} style={{flex:1, justifyContent:'center'}}>
              <Icon name="users" size={12}/>Player
            </button>
          </div>
          <div style={{fontSize:11, color:'var(--muted-foreground)', lineHeight:1.45}}>
            Player view hides DM-only secrets across all pages — notes, relationships, encounter stats.
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
